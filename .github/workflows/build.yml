name: Build and Push

on:
  workflow_dispatch:
    inputs:
      directus_version:
        description: "Directus version tag to build"
        required: true
        type: string
      is_latest:
        description: "Also tag as latest (true/false)"
        required: false
        type: string
        default: "false"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          TAGS="ghcr.io/dstockton/directus-aio:${{ inputs.directus_version }}"
          if [ "${{ inputs.is_latest }}" = "true" ]; then
            TAGS="${TAGS},ghcr.io/dstockton/directus-aio:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            DIRECTUS_VERSION=${{ inputs.directus_version }}
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
